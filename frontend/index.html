<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskify Notes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="overlay"></div>

    <div class="container">

        <h1>📝 Taskify Notes</h1>

        <p class="subtitle">
            Turn messy meeting notes into organized tasks instantly.
        </p>

        <textarea 
            id="notes" 
            placeholder="Paste your notes here..."
        ></textarea>

        <button id="extractBtn">
            Extract Tasks
        </button>

        <div id="result"></div>

        <div class="history-section">
            <h2>📚 Recent Notes</h2>
            <div id="history"></div>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
