<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Taskify Notes</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
            min-height: 100vh;

            /* Deep tech background */
            background: linear-gradient(135deg, #050814, #0b1b3a);

            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* 📒 BACKGROUND PATTERN (notes vibe) */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                url("https://img.icons8.com/ios-filled/100/ffffff/old-book.png"),
                url("https://img.icons8.com/ios-filled/100/ffffff/edit.png"),
                url("https://img.icons8.com/ios-filled/100/ffffff/note.png");
            background-repeat: repeat;
            background-size: 120px;
            opacity: 0.04;
            pointer-events: none;
        }

        /* HEADER */
        .header {
            margin-top: 50px;
            text-align: center;
        }

        .header h1 {
            font-size: 42px;
            margin: 0;
            color: #7dd3fc;
            letter-spacing: 1px;
        }

        .header p {
            color: #94a3b8;
            margin-top: 8px;
        }

        /* INPUT BOX */
        .box {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.06);
            padding: 20px;
            border-radius: 16px;
            backdrop-filter: blur(12px);
            width: 320px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,255,255,0.08);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #38bdf8, #2563eb);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            transform: scale(1.02);
        }

        /* NOTES */
        .notes {
            margin-top: 30px;
            width: 320px;
        }

        .note {
            background: rgba(255, 255, 255, 0.06);
            margin: 10px 0;
            padding: 14px;
            border-radius: 12px;
            border-left: 4px solid #38bdf8;
            backdrop-filter: blur(8px);
        }

        .title {
            font-weight: bold;
            color: #7dd3fc;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Taskify Notes</h1>
        <p>Organize your thoughts like a pro 📒</p>
    </div>

    <div class="box">
        <input id="title" placeholder="Note title">
        <input id="content" placeholder="Note content">
        <button onclick="addNote()">Add Note</button>
    </div>

    <div class="notes" id="notesList"></div>

    <script>
        const API = "http://127.0.0.1:8000";

        function addNote() {
            fetch(`${API}/notes`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    title: document.getElementById("title").value,
                    content: document.getElementById("content").value
                })
            })
            .then(res => res.json())
            .then(() => loadNotes());
        }

        function loadNotes() {
            fetch(`${API}/notes`)
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById("notesList");
                list.innerHTML = "";

                data.forEach(note => {
                    const div = document.createElement("div");
                    div.className = "note";
                    div.innerHTML = `
                        <div class="title">${note.title}</div>
                        <div>${note.content}</div>
                    `;
                    list.appendChild(div);
                });
            });
        }

        loadNotes();
    </script>

</body>
</html>
