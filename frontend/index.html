<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskify Notes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="overlay">

        <div class="container">

            <h1>Taskify Notes 📝</h1>

            <p class="tagline">Turn messy notes into action ✨</p>

            <textarea 
                id="notes" 
                placeholder="Paste your notes here..."
            ></textarea>

            <button id="extractBtn">Extract Tasks</button>

            <div id="result"></div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
